name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Validate version tag
        run: |
          test "v$(cat VERSION)" = "${GITHUB_REF_NAME}"

      - name: Validate project
        run: |
          python -m py_compile src/network_speed_indicator.py
          bash -n install.sh
          bash -n uninstall.sh
          bash -n scripts/build-deb.sh
          bash -n scripts/build-release.sh

      - name: Build release archives
        run: |
          chmod +x install.sh uninstall.sh scripts/build-deb.sh scripts/build-release.sh
          ./scripts/build-release.sh "$(cat VERSION)"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.zip
            dist/*.tar.gz
