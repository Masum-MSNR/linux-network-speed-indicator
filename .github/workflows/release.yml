name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder zip

      - name: Resolve version
        id: version
        run: |
          VERSION="$(tr -d '\n' < VERSION)"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'

      - name: Create or reuse release tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          TAG="v${VERSION}"
          git fetch --tags --force

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            EXISTING_SHA="$(git rev-list -n 1 "${TAG}")"

            if [ "${EXISTING_SHA}" != "${GITHUB_SHA}" ]; then
              echo "${TAG} already exists on ${EXISTING_SHA}, not ${GITHUB_SHA}." >&2
              exit 1
            fi

            echo "Reusing existing ${TAG} on ${GITHUB_SHA}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

      - name: Validate project
        run: |
          python -m py_compile src/network_speed_indicator.py
          bash -n install.sh
          bash -n uninstall.sh
          bash -n scripts/build-deb.sh
          bash -n scripts/build-flatpak.sh
          bash -n scripts/build-snap.sh
          bash -n scripts/build-release.sh

      - name: Build Snap bundle
        id: snapcraft
        uses: snapcore/action-build@v1

      - name: Build release archives
        run: |
          chmod +x install.sh uninstall.sh scripts/build-deb.sh scripts/build-flatpak.sh scripts/build-snap.sh scripts/build-release.sh
          ./scripts/build-release.sh "$(cat VERSION)"

      - name: Build Flatpak bundle
        run: |
          ./scripts/build-flatpak.sh

      - name: Collect Snap bundle
        run: |
          mkdir -p dist
          cp "${{ steps.snapcraft.outputs.snap }}" dist/

      - name: Publish Snap to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_LOGIN }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.flatpak
            dist/*.snap
            dist/*.zip
            dist/*.tar.gz
