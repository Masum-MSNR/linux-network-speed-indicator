name: CI and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          version_changed=false

          if [ "${EVENT_NAME}" = "push" ]; then
            if [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
              changed_files="$(git diff --name-only "${BEFORE_SHA}" "${CURRENT_SHA}")"
            else
              changed_files="$(git show --pretty='' --name-only "${CURRENT_SHA}")"
            fi

            if printf '%s\n' "${changed_files}" | grep -q '^VERSION$'; then
              version_changed=true
            fi
          fi

          echo "version_changed=${version_changed}" >> "${GITHUB_OUTPUT}"

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Validate project
        run: |
          bash ./scripts/validate-project.sh

      - name: Build release archives
        run: |
          chmod +x install.sh uninstall.sh scripts/build-deb.sh scripts/build-flatpak.sh scripts/build-snap.sh scripts/build-release.sh scripts/validate-project.sh
          ./scripts/build-release.sh "$(cat VERSION)"

  build-and-release:
    needs:
      - detect-release
      - validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-release.outputs.version_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            runner: ubuntu-latest
          - architecture: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Snapcraft
        run: |
          sudo snap install --classic snapcraft

      - name: Build Snap bundle (destructive mode, with retry)
        id: snapcraft
        run: |
          set -e
          attempt=1
          max=3
          while :; do
            echo "::group::snapcraft pack attempt ${attempt}/${max}"
            if sudo snapcraft pack --destructive-mode --platform ${{ matrix.architecture }} --output .; then
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            if [ "${attempt}" -ge "${max}" ]; then
              echo "snapcraft failed after ${max} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            echo "Retrying after transient failure..."
            sudo snapcraft clean || true
            sleep 15
          done
          snap_file="$(ls -1 *.snap | head -1)"
          echo "snap=${snap_file}" >> "${GITHUB_OUTPUT}"

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-${{ matrix.architecture }}
          path: ${{ steps.snapcraft.outputs.snap }}

  finalize-release:
    needs:
      - detect-release
      - validate
      - build-and-release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder zip

      - name: Resolve version
        id: version
        run: |
          VERSION="$(tr -d '\n' < VERSION)"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'

      - name: Build release archives
        run: |
          chmod +x install.sh uninstall.sh scripts/build-deb.sh scripts/build-flatpak.sh scripts/build-snap.sh scripts/build-release.sh scripts/validate-project.sh
          ./scripts/build-release.sh "$(cat VERSION)"

      - name: Build Flatpak bundle
        run: |
          ./scripts/build-flatpak.sh

      - name: Download Snap artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: snap-*
          path: dist
          merge-multiple: true

      - name: Install Snapcraft
        run: |
          if ! command -v snapcraft >/dev/null 2>&1 && [ ! -x /snap/bin/snapcraft ]; then
            sudo snap install --classic snapcraft
          fi

      - name: Publish Snap revisions to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_LOGIN }}
        run: |
          snapcraft_bin="$(command -v snapcraft || true)"
          if [ -z "${snapcraft_bin}" ]; then
            snapcraft_bin=/snap/bin/snapcraft
          fi

          for snap_file in dist/*.snap; do
            "${snapcraft_bin}" upload --release stable "${snap_file}"
          done

      - name: Create or reuse release tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          TAG="v${VERSION}"
          git fetch --tags --force

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            EXISTING_SHA="$(git rev-list -n 1 "${TAG}")"

            if [ "${EXISTING_SHA}" != "${GITHUB_SHA}" ]; then
              echo "${TAG} already exists on ${EXISTING_SHA}, not ${GITHUB_SHA}." >&2
              exit 1
            fi

            echo "Reusing existing ${TAG} on ${GITHUB_SHA}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.flatpak
            dist/*.snap
            dist/*.zip
            dist/*.tar.gz
