name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder zip

      - name: Validate project
        run: |
          bash ./scripts/validate-project.sh

      - name: Build Snap bundle
        id: snapcraft
        uses: snapcore/action-build@v1

      - name: Build release archives
        run: |
          chmod +x install.sh uninstall.sh scripts/build-deb.sh scripts/build-flatpak.sh scripts/build-snap.sh scripts/build-release.sh scripts/validate-project.sh
          ./scripts/build-release.sh "$(cat VERSION)"

      - name: Build Flatpak bundle
        run: |
          ./scripts/build-flatpak.sh
